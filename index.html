<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
  <link href="style.css" rel="stylesheet">

<body>
  <br>
  <br>
  <div class="container bg-primary text-center">
    <div class="row">

      <div class="col-3 bg-primary align-self-center  my-2">

          A
        </div>
      </div>

      <div class="col-3 bg-primary align-self-center px-1">

          <div class="col">
            <div class="bg-success">
              C
            </div>
          </div>
        </div>

        <div class="row bg-primary">

              D
            </div>
          </div>
        </div>
      </div>

      </div> -->
    </div>

  <br>

  <div class="grid-container">
    <div class="grid-item a">A</div>
    <div class="grid-item b">B</div>
    <div class="grid-item c">C</div>
    <div class="grid-item d">D</div>
